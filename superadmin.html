<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SuperAdmin — MindSpace</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0b0f;
    --surface: #12141a;
    --surface2: #1a1d26;
    --surface3: #22263a;
    --border: #2a2f45;
    --accent: #1900ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --warn: #ffb347;
    --danger: #ff4757;
    --text: #e8eaf0;
    --text2: #8890b0;
    --text3: #555d80;
    --tag-impact: #1900ff;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── AUTH GATE ── */
  #auth-gate {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, #1a1440 0%, #0a0b0f 60%);
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow);
  }

  .auth-logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .auth-logo .badge {
    display: inline-block;
    background: linear-gradient(135deg, #1900ff, #ff6584);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .auth-logo h1 { font-size: 28px; font-weight: 700; }

  .auth-logo p { color: var(--text2); font-size: 14px; margin-top: 6px; }

  .field { margin-bottom: 16px; }

  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }

  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
  }

  .field input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #9c63ff);
    border: none;
    border-radius: 10px;
    padding: 14px;
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .2s, transform .1s;
  }

  .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .auth-err { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 20px; }

  /* ── MAIN APP ── */
  #app { display: none; min-height: 100vh; }

  /* Sidebar */
  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    transition: transform .3s;
  }

  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-logo .badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: block;
    margin-bottom: 4px;
  }

  .sidebar-logo h2 { font-size: 18px; font-weight: 700; }

  .sidebar-logo .hashtag {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    margin-top: 6px;
    opacity: .7;
    animation: pulse-tag 3s infinite;
  }

  @keyframes pulse-tag {
    0%, 100% { opacity: .5; }
    50% { opacity: 1; }
  }

  .nav { flex: 1; padding: 16px 12px; overflow-y: auto; }

  .nav-section { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); padding: 0 8px; margin: 16px 0 8px; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text2);
    font-size: 14px;
    font-weight: 500;
    transition: all .15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: linear-gradient(90deg, rgba(108,99,255,.2), transparent); color: var(--accent); border-left: 2px solid var(--accent); }
  .nav-item .icon { font-size: 17px; flex-shrink: 0; }
  .nav-item .badge-count { margin-left: auto; background: var(--danger); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }

  .sidebar-footer {
    padding: 16px 12px;
    border-top: 1px solid var(--border);
  }

  .admin-identity {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px; background: var(--surface2);
    margin-bottom: 8px;
  }

  .admin-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
  }

  .admin-info { flex: 1; min-width: 0; }
  .admin-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .admin-role { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

  .btn-signout {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px; color: var(--text2); font-family: inherit;
    font-size: 13px; cursor: pointer; transition: all .15s;
  }

  .btn-signout:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

  /* Mobile overlay */
  .sidebar-overlay {
    display: none;
    position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 99;
  }

  /* Main content */
  .main { margin-left: 260px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

  .topbar {
    height: 64px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 16px;
    position: sticky; top: 0; z-index: 50;
  }

  .hamburger {
    display: none; background: none; border: none; color: var(--text); font-size: 22px;
    cursor: pointer; padding: 4px;
  }

  .topbar-title { font-size: 18px; font-weight: 600; flex: 1; }

  .topbar-right { display: flex; align-items: center; gap: 12px; }

  .impact-tag {
    font-size: 11px; font-weight: 700; color: var(--accent);
    letter-spacing: 1px; opacity: .7;
    animation: pulse-tag 4s infinite;
  }

  .page { padding: 28px 28px; flex: 1; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative; overflow: hidden;
    transition: transform .2s, border-color .2s;
  }

  .stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }

  .stat-card::before {
    content: ''; position: absolute;
    top: 0; right: 0; width: 80px; height: 80px;
    background: radial-gradient(circle, rgba(108,99,255,.15), transparent 70%);
    border-radius: 50%;
  }

  .stat-icon { font-size: 24px; margin-bottom: 12px; }
  .stat-value { font-size: 32px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .stat-label { font-size: 12px; color: var(--text2); font-weight: 500; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-card.danger .stat-value { color: var(--danger); }
  .stat-card.success .stat-value { color: var(--accent3); }
  .stat-card.warn .stat-value { color: var(--warn); }
  .stat-card.accent .stat-value { color: var(--accent); }

  /* Section header */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
  }

  .section-header h2 { font-size: 16px; font-weight: 600; }

  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .search-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 14px; color: var(--text); font-family: inherit; font-size: 14px;
    outline: none; width: 220px; transition: border-color .2s;
  }

  .search-box:focus { border-color: var(--accent); }

  .filter-select {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 14px; color: var(--text); font-family: inherit; font-size: 14px;
    outline: none; cursor: pointer;
  }

  /* Tables */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; overflow-x: auto;
  }

  table { width: 100%; border-collapse: collapse; min-width: 600px; }

  thead th {
    background: var(--surface2); padding: 12px 16px; text-align: left;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text2); white-space: nowrap;
  }

  tbody tr { border-top: 1px solid var(--border); transition: background .1s; }
  tbody tr:hover { background: var(--surface2); }

  td { padding: 12px 16px; font-size: 14px; vertical-align: middle; }

  .user-cell { display: flex; align-items: center; gap: 10px; }

  .mini-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
  }

  .mini-name { font-weight: 500; }
  .mini-sub { font-size: 11px; color: var(--text2); }

  .badge-role {
    display: inline-block; padding: 3px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
  }

  .badge-role.user { background: rgba(108,99,255,.15); color: var(--accent); }
  .badge-role.admin { background: rgba(255,101,132,.15); color: var(--accent2); }
  .badge-role.superadmin { background: rgba(67,233,123,.15); color: var(--accent3); }

  .badge-status {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }

  .badge-status.active { background: rgba(67,233,123,.1); color: var(--accent3); }
  .badge-status.frozen { background: rgba(255,71,87,.1); color: var(--danger); }
  .badge-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .action-btns { display: flex; gap: 6px; flex-wrap: wrap; }

  .btn-sm {
    padding: 5px 12px; border-radius: 6px; font-family: inherit;
    font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid;
    transition: all .15s; white-space: nowrap;
  }

  .btn-sm.freeze { border-color: var(--warn); color: var(--warn); background: rgba(255,179,71,.08); }
  .btn-sm.freeze:hover { background: var(--warn); color: #000; }
  .btn-sm.unfreeze { border-color: var(--accent3); color: var(--accent3); background: rgba(67,233,123,.08); }
  .btn-sm.unfreeze:hover { background: var(--accent3); color: #000; }
  .btn-sm.delete { border-color: var(--danger); color: var(--danger); background: rgba(255,71,87,.08); }
  .btn-sm.delete:hover { background: var(--danger); color: #fff; }
  .btn-sm.view { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,.08); }
  .btn-sm.view:hover { background: var(--accent); color: #fff; }
  .btn-sm.promote { border-color: var(--accent3); color: var(--accent3); background: rgba(67,233,123,.08); }
  .btn-sm.promote:hover { background: var(--accent3); color: #000; }
  .btn-sm.demote { border-color: var(--text2); color: var(--text2); background: rgba(136,144,176,.08); }
  .btn-sm.demote:hover { background: var(--text2); color: #000; }

  /* Conversation monitor */
  .conv-list { display: flex; flex-direction: column; gap: 10px; }

  .conv-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; cursor: pointer; transition: all .2s;
    display: flex; align-items: flex-start; gap: 14px;
  }

  .conv-card:hover { border-color: var(--accent); transform: translateX(3px); }

  .conv-avatar {
    width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #fff;
  }

  .conv-info { flex: 1; min-width: 0; }
  .conv-name { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
  .conv-preview { font-size: 13px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .conv-time { font-size: 11px; color: var(--text3); }
  .mood-tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: rgba(108,99,255,.15); color: var(--accent); }
  .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; margin-top: 6px; }

  /* Message viewer modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 200; align-items: center; justify-content: center; padding: 20px;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    width: 100%; max-width: 640px; max-height: 80vh; display: flex; flex-direction: column;
    box-shadow: var(--shadow);
  }

  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .modal-header h3 { font-size: 16px; font-weight: 600; }
  .modal-close { background: none; border: none; color: var(--text2); font-size: 22px; cursor: pointer; padding: 4px; }
  .modal-close:hover { color: var(--text); }

  .modal-body { flex: 1; overflow-y: auto; padding: 16px 24px; }

  .msg-bubble { display: flex; gap: 10px; margin-bottom: 14px; }
  .msg-bubble.counsellor { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    background: var(--surface3); display: flex; align-items: center;
    justify-content: center; font-size: 12px; font-weight: 600;
  }

  .msg-bubble.counsellor .msg-avatar { background: linear-gradient(135deg, var(--accent), #9c63ff); color: #fff; }

  .msg-content-wrap { max-width: 75%; }

  .msg-sender { font-size: 11px; color: var(--text2); margin-bottom: 3px; font-weight: 600; }
  .msg-bubble.counsellor .msg-sender { text-align: right; }

  .msg-text {
    padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    word-break: break-word;
  }

  .msg-bubble.counsellor .msg-text {
    background: linear-gradient(135deg, rgba(108,99,255,.3), rgba(156,99,255,.2));
    border-color: rgba(108,99,255,.3);
  }

  .msg-time { font-size: 10px; color: var(--text3); margin-top: 3px; }
  .msg-bubble.counsellor .msg-time { text-align: right; }

  .msg-voice { display: flex; align-items: center; gap: 8px; color: var(--accent); font-size: 13px; }
  .msg-image img { max-width: 200px; border-radius: 8px; margin-top: 4px; }

  /* Confirm dialog */
  .confirm-dialog {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 300; align-items: center; justify-content: center;
  }

  .confirm-dialog.show { display: flex; }

  .confirm-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 32px; max-width: 380px; width: 90%; text-align: center;
    box-shadow: var(--shadow);
  }

  .confirm-box .icon { font-size: 40px; margin-bottom: 12px; }
  .confirm-box h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .confirm-box p { font-size: 14px; color: var(--text2); line-height: 1.5; margin-bottom: 24px; }
  .confirm-btns { display: flex; gap: 10px; justify-content: center; }

  .btn-cancel { padding: 10px 24px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: inherit; font-size: 14px; cursor: pointer; transition: background .15s; }
  .btn-cancel:hover { background: var(--surface3); }
  .btn-confirm-del { padding: 10px 24px; border-radius: 8px; border: none; background: var(--danger); color: #fff; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn-confirm-del:hover { opacity: .85; }

  /* Toast */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 400; display: flex; flex-direction: column; gap: 8px; }

  .toast {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 18px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow); transform: translateX(100px); opacity: 0;
    transition: all .3s; max-width: 320px;
  }

  .toast.show { transform: translateX(0); opacity: 1; }
  .toast.success { border-left: 3px solid var(--accent3); }
  .toast.error { border-left: 3px solid var(--danger); }
  .toast.info { border-left: 3px solid var(--accent); }

  /* Empty state */
  .empty { text-align: center; padding: 60px 24px; color: var(--text2); }
  .empty .icon { font-size: 48px; margin-bottom: 12px; opacity: .5; }
  .empty p { font-size: 15px; }

  /* Loading */
  .loading { text-align: center; padding: 48px; color: var(--text2); }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--surface3); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Analytics */
  .chart-placeholder {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px; text-align: center; color: var(--text2);
  }

  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 120px; padding: 0 8px; }

  .bar {
    flex: 1; background: linear-gradient(to top, var(--accent), rgba(108,99,255,.3));
    border-radius: 4px 4px 0 0; min-height: 4px;
    transition: height .6s ease;
    position: relative;
  }

  .bar:hover::after {
    content: attr(data-val);
    position: absolute; top: -24px; left: 50%; transform: translateX(-50%);
    font-size: 11px; font-weight: 600; color: var(--text); background: var(--surface2);
    padding: 2px 6px; border-radius: 4px; white-space: nowrap;
  }

  .bar-labels { display: flex; gap: 8px; padding: 6px 8px 0; }
  .bar-labels span { flex: 1; text-align: center; font-size: 11px; color: var(--text3); }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.show { display: block; }
    .main { margin-left: 0; }
    .hamburger { display: block; }
    .page { padding: 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .topbar { padding: 0 16px; }
    .search-box { width: 160px; }
    .impact-tag { display: none; }
  }

  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .action-btns { flex-direction: column; }
    .auth-card { padding: 32px 20px; }
    .modal { max-height: 90vh; }
    .controls { width: 100%; }
    .search-box { width: 100%; }
  }
</style>
</head>
<body>

<!-- ── AUTH GATE ── -->
<div id="auth-gate">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="badge">MindSpace</span>
      <h1>🛡️ SuperAdmin</h1>
      <p>Restricted access — authorised personnel only</p>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="sa-email" placeholder="superadmin@mindspace.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="sa-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')saLogin()" />
    </div>
    <button class="btn-primary" onclick="saLogin()">Sign In →</button>
    <div class="auth-err" id="sa-err"></div>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app">
  <div class="layout">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <span class="badge">MindSpace</span>
        <h2>🛡️ SuperAdmin</h2>
        <div class="hashtag">#RiseWithIMPACT</div>
      </div>

      <nav class="nav">
        <div class="nav-section">Overview</div>
        <button class="nav-item active" onclick="showPage('dashboard')" data-page="dashboard">
          <span class="icon">📊</span> Dashboard
        </button>

        <div class="nav-section">Management</div>
        <button class="nav-item" onclick="showPage('users')" data-page="users">
          <span class="icon">👥</span> Users
        </button>
        <button class="nav-item" onclick="showPage('admins')" data-page="admins">
          <span class="icon">🎓</span> Counsellors
        </button>
        <button class="nav-item" onclick="showPage('conversations')" data-page="conversations">
          <span class="icon">💬</span> Conversations
          <span class="badge-count" id="unread-badge" style="display:none">0</span>
        </button>

        <div class="nav-section">System</div>
        <button class="nav-item" onclick="showPage('flagged')" data-page="flagged">
          <span class="icon">🚩</span> Flagged
        </button>
        <button class="nav-item" onclick="showPage('frozen')" data-page="frozen">
          <span class="icon">❄️</span> Frozen Accounts
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="admin-identity">
          <div class="admin-avatar" id="sa-avatar">SA</div>
          <div class="admin-info">
            <div class="admin-name" id="sa-name">SuperAdmin</div>
            <div class="admin-role">superadmin</div>
          </div>
        </div>
        <button class="btn-signout" onclick="saSignOut()">Sign Out</button>
      </div>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- Main -->
    <div class="main">
      <div class="topbar">
        <button class="hamburger" onclick="openSidebar()">☰</button>
        <div class="topbar-title" id="page-title">Dashboard</div>
        <div class="topbar-right">
          <span class="impact-tag">#RiseWithIMPACT</span>
        </div>
      </div>

      <div class="page" id="page-content">
        <div class="loading"><div class="spinner"></div><br>Loading dashboard…</div>
      </div>
    </div>

  </div>
</div>

<!-- Message Viewer Modal -->
<div class="modal-overlay" id="msg-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-conv-title">Conversation</h3>
      <button class="modal-close" onclick="closeMsgModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-messages">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- Confirm Delete Dialog -->
<div class="confirm-dialog" id="confirm-dialog">
  <div class="confirm-box">
    <div class="icon">⚠️</div>
    <h3 id="confirm-title">Are you sure?</h3>
    <p id="confirm-msg">This action cannot be undone.</p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-confirm-del" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-container" id="toasts"></div>

<script>
// ── STATE ──
let currentUser = null;
let currentPage = 'dashboard';
let allUsers = [];
let allConvs = [];
let confirmCallback = null;

// ── AUTH ──
async function saLogin() {
  const email = document.getElementById('sa-email').value.trim();
  const pass = document.getElementById('sa-pass').value;
  const errEl = document.getElementById('sa-err');
  errEl.textContent = 'Signing in…';

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { errEl.textContent = '↳ ' + error.message; return; }

  const profile = await getProfile(data.user.id);
  if (!profile || profile.role !== 'superadmin') {
    await sb.auth.signOut();
    errEl.textContent = '↳ Access denied. Superadmin privileges required.';
    return;
  }

  currentUser = { ...data.user, profile };
  bootApp();
}

async function bootApp() {
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  const name = currentUser.profile.display_name || 'SuperAdmin';
  document.getElementById('sa-name').textContent = name;
  document.getElementById('sa-avatar').textContent = name.charAt(0).toUpperCase();

  showPage('dashboard');
}

async function saSignOut() {
  await sb.auth.signOut();
  location.reload();
}

async function getProfile(id) {
  const { data } = await sb.from('profiles').select('*').eq('id', id).single();
  return data;
}

// Check existing session
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const profile = await getProfile(session.user.id);
    if (profile?.role === 'superadmin') {
      currentUser = { ...session.user, profile };
      bootApp();
    }
  }
})();

// ── NAVIGATION ──
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });

  const titles = {
    dashboard: 'Dashboard',
    users: 'User Management',
    admins: 'Counsellor Management',
    conversations: 'Conversation Monitor',
    flagged: 'Flagged Conversations',
    frozen: 'Frozen Accounts'
  };

  document.getElementById('page-title').textContent = titles[page] || page;
  document.getElementById('page-content').innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading…</div>';

  closeSidebar();

  if (page === 'dashboard') renderDashboard();
  else if (page === 'users') renderUsers();
  else if (page === 'admins') renderAdmins();
  else if (page === 'conversations') renderConversations();
  else if (page === 'flagged') renderFlagged();
  else if (page === 'frozen') renderFrozen();
}

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('show');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

// ── DASHBOARD ──
async function renderDashboard() {
  const [
    { count: totalUsers },
    { count: totalConvs },
    { count: frozenCount },
    { count: flaggedCount },
    { count: msgCount }
  ] = await Promise.all([
    sb.from('profiles').select('*', { count: 'exact', head: true }).eq('role', 'user'),
    sb.from('conversations').select('*', { count: 'exact', head: true }),
    sb.from('profiles').select('*', { count: 'exact', head: true }).eq('is_frozen', true),
    sb.from('conversations').select('*', { count: 'exact', head: true }).eq('flagged', true),
    sb.from('messages').select('*', { count: 'exact', head: true })
  ]);

  // Recent activity (last 7 days messages per day)
  const { data: recentMsgs } = await sb.from('messages')
    .select('created_at')
    .gte('created_at', new Date(Date.now() - 7 * 86400000).toISOString())
    .order('created_at', { ascending: true });

  const dayMap = {};
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    dayMap[d.toDateString()] = { label: days[d.getDay()], count: 0 };
  }
  (recentMsgs || []).forEach(m => {
    const k = new Date(m.created_at).toDateString();
    if (dayMap[k]) dayMap[k].count++;
  });

  const dayArr = Object.values(dayMap);
  const maxVal = Math.max(...dayArr.map(d => d.count), 1);

  const bars = dayArr.map(d =>
    `<div class="bar" style="height:${Math.max(4, (d.count / maxVal) * 100)}%" data-val="${d.count}"></div>`
  ).join('');

  const labels = dayArr.map(d => `<span>${d.label}</span>`).join('');

  // Unread count
  const { count: unread } = await sb.from('conversations')
    .select('*', { count: 'exact', head: true })
    .eq('unread_admin', true);

  if (unread > 0) {
    const b = document.getElementById('unread-badge');
    b.textContent = unread; b.style.display = '';
  }

  document.getElementById('page-content').innerHTML = `
    <div style="margin-bottom:8px;font-size:12px;color:var(--text3);font-weight:600;letter-spacing:2px;text-transform:uppercase;">#RiseWithIMPACT — SuperAdmin Control Centre</div>

    <div class="stats-grid">
      <div class="stat-card accent">
        <div class="stat-icon">👥</div>
        <div class="stat-value">${totalUsers ?? 0}</div>
        <div class="stat-label">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💬</div>
        <div class="stat-value">${totalConvs ?? 0}</div>
        <div class="stat-label">Conversations</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✉️</div>
        <div class="stat-value">${msgCount ?? 0}</div>
        <div class="stat-label">Total Messages</div>
      </div>
      <div class="stat-card warn">
        <div class="stat-icon">🚩</div>
        <div class="stat-value">${flaggedCount ?? 0}</div>
        <div class="stat-label">Flagged</div>
      </div>
      <div class="stat-card danger">
        <div class="stat-icon">❄️</div>
        <div class="stat-value">${frozenCount ?? 0}</div>
        <div class="stat-label">Frozen Accounts</div>
      </div>
      <div class="stat-card success">
        <div class="stat-icon">📨</div>
        <div class="stat-value">${unread ?? 0}</div>
        <div class="stat-label">Unread Chats</div>
      </div>
    </div>

    <div class="section-header"><h2>📈 Message Activity (Last 7 Days)</h2></div>
    <div class="table-wrap" style="padding:20px 16px 8px;margin-bottom:24px;">
      <div class="bar-chart">${bars}</div>
      <div class="bar-labels">${labels}</div>
    </div>

    <div class="section-header">
      <h2>⚡ Quick Actions</h2>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;">
      <button class="btn-sm view" style="padding:10px 20px;font-size:13px;" onclick="showPage('conversations')">💬 Monitor Conversations</button>
      <button class="btn-sm freeze" style="padding:10px 20px;font-size:13px;" onclick="showPage('flagged')">🚩 Review Flagged</button>
      <button class="btn-sm promote" style="padding:10px 20px;font-size:13px;" onclick="showPage('users')">👥 Manage Users</button>
      <button class="btn-sm" style="padding:10px 20px;font-size:13px;border-color:var(--accent2);color:var(--accent2);" onclick="showPage('admins')">🎓 Manage Counsellors</button>
    </div>
  `;
}

// ── USERS ──
async function renderUsers(filter = '', roleFilter = '') {
  let query = sb.from('profiles').select('*, conversations(count)').order('created_at', { ascending: false });
  if (roleFilter) query = query.eq('role', roleFilter);
  else query = query.eq('role', 'user');

  const { data: users, error } = await query;
  allUsers = users || [];

  let filtered = allUsers;
  if (filter) filtered = allUsers.filter(u => u.display_name?.toLowerCase().includes(filter.toLowerCase()));

  const rows = filtered.map(u => `
    <tr>
      <td>
        <div class="user-cell">
          <div class="mini-avatar">${(u.display_name||'?').charAt(0).toUpperCase()}</div>
          <div>
            <div class="mini-name">${esc(u.display_name || 'Unknown')}</div>
            <div class="mini-sub">${u.is_frozen ? '❄️ Frozen' : '✓ Active'}</div>
          </div>
        </div>
      </td>
      <td><span class="badge-role ${u.role}">${u.role}</span></td>
      <td><span class="badge-status ${u.is_frozen ? 'frozen' : 'active'}">${u.is_frozen ? 'Frozen' : 'Active'}</span></td>
      <td><span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2)">${formatDate(u.created_at)}</span></td>
      <td>
        <div class="action-btns">
          <button class="btn-sm view" onclick="viewUserConvs('${u.id}','${esc(u.display_name)}')">💬 Chats</button>
          ${u.is_frozen
            ? `<button class="btn-sm unfreeze" onclick="setFrozen('${u.id}',false,'${esc(u.display_name)}')">✅ Unfreeze</button>`
            : `<button class="btn-sm freeze" onclick="setFrozen('${u.id}',true,'${esc(u.display_name)}')">❄️ Freeze</button>`
          }
          <button class="btn-sm delete" onclick="confirmDelete('${u.id}','${esc(u.display_name)}')">🗑 Delete</button>
        </div>
      </td>
    </tr>
  `).join('') || '<tr><td colspan="5"><div class="empty"><div class="icon">👤</div><p>No users found</p></div></td></tr>';

  document.getElementById('page-content').innerHTML = `
    <div class="section-header">
      <h2>Users <span style="color:var(--text2);font-weight:400">(${filtered.length})</span></h2>
      <div class="controls">
        <input class="search-box" placeholder="🔍 Search by name…" oninput="renderUsers(this.value)" value="${filter}" />
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>User</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

// ── ADMINS ──
async function renderAdmins() {
  const { data: admins } = await sb.from('profiles').select('*').in('role', ['admin','superadmin']).order('created_at');

  const rows = (admins || []).map(u => `
    <tr>
      <td>
        <div class="user-cell">
          <div class="mini-avatar" style="background:linear-gradient(135deg,var(--accent2),#ff8fa3)">${(u.display_name||'?').charAt(0).toUpperCase()}</div>
          <div>
            <div class="mini-name">${esc(u.display_name || 'Unknown')}</div>
            <div class="mini-sub">${u.is_frozen ? '❄️ Frozen' : '✓ Active'}</div>
          </div>
        </div>
      </td>
      <td><span class="badge-role ${u.role}">${u.role}</span></td>
      <td><span class="badge-status ${u.is_frozen ? 'frozen' : 'active'}">${u.is_frozen ? 'Frozen' : 'Active'}</span></td>
      <td><span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2)">${formatDate(u.created_at)}</span></td>
      <td>
        <div class="action-btns">
          ${u.role === 'admin'
            ? `<button class="btn-sm demote" onclick="changeRole('${u.id}','user','${esc(u.display_name)}')">⬇ Demote</button>`
            : ''
          }
          ${u.id !== currentUser.id
            ? `<button class="btn-sm delete" onclick="confirmDelete('${u.id}','${esc(u.display_name)}')">🗑 Delete</button>`
            : '<span style="font-size:12px;color:var(--text3)">← You</span>'
          }
        </div>
      </td>
    </tr>
  `).join('') || '<tr><td colspan="5"><div class="empty"><div class="icon">🎓</div><p>No counsellors found</p></div></td></tr>';

  // Get all regular users to promote
  const { data: users } = await sb.from('profiles').select('id,display_name').eq('role','user').order('display_name').limit(100);

  const userOptions = (users || []).map(u =>
    `<option value="${u.id}">${esc(u.display_name)}</option>`
  ).join('');

  document.getElementById('page-content').innerHTML = `
    <div class="section-header">
      <h2>Counsellors & Superadmin <span style="color:var(--text2);font-weight:400">(${(admins||[]).length})</span></h2>
    </div>
    <div class="table-wrap" style="margin-bottom:24px">
      <table>
        <thead><tr><th>Name</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <div class="section-header"><h2>➕ Promote User to Counsellor</h2></div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
      <select class="filter-select" id="promote-user" style="flex:1;min-width:200px">
        <option value="">Select a user…</option>
        ${userOptions}
      </select>
      <button class="btn-sm promote" style="padding:10px 20px;font-size:13px;" onclick="promoteSelected()">⬆ Promote to Counsellor</button>
    </div>
  `;
}

async function promoteSelected() {
  const sel = document.getElementById('promote-user');
  const id = sel.value;
  const name = sel.options[sel.selectedIndex]?.text;
  if (!id) { toast('Select a user first', 'error'); return; }
  await changeRole(id, 'admin', name);
  renderAdmins();
}

async function changeRole(userId, newRole, name) {
  const { error } = await sb.from('profiles').update({ role: newRole }).eq('id', userId);
  if (error) { toast('Failed to update role: ' + error.message, 'error'); return; }
  toast(`${name} is now ${newRole} ✓`, 'success');
  if (currentPage === 'admins') renderAdmins();
  else if (currentPage === 'users') renderUsers();
}

// ── CONVERSATIONS ──
async function renderConversations(filter = '') {
  const { data: convs } = await sb.from('conversations')
    .select('*, profiles(display_name, is_frozen)')
    .order('updated_at', { ascending: false })
    .limit(80);

  allConvs = convs || [];
  let filtered = allConvs;
  if (filter) filtered = allConvs.filter(c =>
    c.profiles?.display_name?.toLowerCase().includes(filter.toLowerCase())
  );

  if (filtered.length === 0) {
    document.getElementById('page-content').innerHTML = `
      <div class="section-header"><h2>Conversations</h2></div>
      <div class="empty"><div class="icon">💬</div><p>No conversations yet</p></div>`;
    return;
  }

  const cards = filtered.map(c => {
    const name = c.profiles?.display_name || 'Unknown';
    return `
      <div class="conv-card" onclick="openMsgModal('${c.id}','${esc(name)}')">
        <div class="conv-avatar">${name.charAt(0).toUpperCase()}</div>
        <div class="conv-info">
          <div class="conv-name">${esc(name)}</div>
          <div class="conv-preview">${c.status} conversation</div>
          <div class="conv-meta">
            <span class="conv-time">Updated ${timeAgo(c.updated_at)}</span>
            ${c.last_mood ? `<span class="mood-tag">😊 ${esc(c.last_mood)}</span>` : ''}
            ${c.flagged ? `<span class="mood-tag" style="background:rgba(255,71,87,.15);color:var(--danger)">🚩 Flagged</span>` : ''}
          </div>
        </div>
        ${c.unread_admin ? '<div class="unread-dot"></div>' : ''}
      </div>`;
  }).join('');

  document.getElementById('page-content').innerHTML = `
    <div class="section-header">
      <h2>Conversations <span style="color:var(--text2);font-weight:400">(${filtered.length})</span></h2>
      <div class="controls">
        <input class="search-box" placeholder="🔍 Search by name…" oninput="renderConversations(this.value)" value="${filter}" />
      </div>
    </div>
    <div class="conv-list">${cards}</div>
  `;
}

// ── FLAGGED ──
async function renderFlagged() {
  const { data: convs } = await sb.from('conversations')
    .select('*, profiles(display_name)')
    .eq('flagged', true)
    .order('updated_at', { ascending: false });

  if (!convs || convs.length === 0) {
    document.getElementById('page-content').innerHTML = `
      <div class="section-header"><h2>🚩 Flagged Conversations</h2></div>
      <div class="empty"><div class="icon">✅</div><p>No flagged conversations — all clear!</p></div>`;
    return;
  }

  const cards = convs.map(c => {
    const name = c.profiles?.display_name || 'Unknown';
    return `
      <div class="conv-card" onclick="openMsgModal('${c.id}','${esc(name)}')">
        <div class="conv-avatar" style="background:linear-gradient(135deg,var(--danger),#ff8fa3)">🚩</div>
        <div class="conv-info">
          <div class="conv-name">${esc(name)}</div>
          <div class="conv-preview">Flagged conversation — click to review</div>
          <div class="conv-meta">
            <span class="conv-time">${timeAgo(c.updated_at)}</span>
            ${c.last_mood ? `<span class="mood-tag">😊 ${esc(c.last_mood)}</span>` : ''}
          </div>
        </div>
        <div style="flex-shrink:0">
          <button class="btn-sm unfreeze" onclick="event.stopPropagation();unflagConv('${c.id}')">✓ Unflag</button>
        </div>
      </div>`;
  }).join('');

  document.getElementById('page-content').innerHTML = `
    <div class="section-header"><h2>🚩 Flagged Conversations <span style="color:var(--text2);font-weight:400">(${convs.length})</span></h2></div>
    <div class="conv-list">${cards}</div>
  `;
}

async function unflagConv(id) {
  await sb.from('conversations').update({ flagged: false }).eq('id', id);
  toast('Conversation unflagged ✓', 'success');
  renderFlagged();
}

// ── FROZEN ──
async function renderFrozen() {
  const { data: users } = await sb.from('profiles').select('*').eq('is_frozen', true).order('display_name');

  if (!users || users.length === 0) {
    document.getElementById('page-content').innerHTML = `
      <div class="section-header"><h2>❄️ Frozen Accounts</h2></div>
      <div class="empty"><div class="icon">❄️</div><p>No frozen accounts</p></div>`;
    return;
  }

  const rows = users.map(u => `
    <tr>
      <td>
        <div class="user-cell">
          <div class="mini-avatar" style="background:linear-gradient(135deg,#4fc3f7,#0288d1)">${(u.display_name||'?').charAt(0).toUpperCase()}</div>
          <div><div class="mini-name">${esc(u.display_name)}</div><div class="mini-sub">${u.role}</div></div>
        </div>
      </td>
      <td><span class="badge-status frozen">Frozen</span></td>
      <td><span style="font-size:12px;color:var(--text2)">${formatDate(u.created_at)}</span></td>
      <td>
        <div class="action-btns">
          <button class="btn-sm unfreeze" onclick="setFrozen('${u.id}',false,'${esc(u.display_name)}')">✅ Unfreeze</button>
          <button class="btn-sm delete" onclick="confirmDelete('${u.id}','${esc(u.display_name)}')">🗑 Delete</button>
        </div>
      </td>
    </tr>
  `).join('');

  document.getElementById('page-content').innerHTML = `
    <div class="section-header"><h2>❄️ Frozen Accounts <span style="color:var(--text2);font-weight:400">(${users.length})</span></h2></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>User</th><th>Status</th><th>Frozen Since</th><th>Actions</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

// ── ACTIONS ──
async function setFrozen(userId, frozen, name) {
  const { error } = await sb.from('profiles').update({ is_frozen: frozen }).eq('id', userId);
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  toast(`${name} ${frozen ? 'frozen ❄️' : 'unfrozen ✅'}`, frozen ? 'info' : 'success');
  if (currentPage === 'users') renderUsers();
  else if (currentPage === 'frozen') renderFrozen();
}

async function viewUserConvs(userId, name) {
  // Find conversation for this user and open it
  const { data: conv } = await sb.from('conversations').select('id').eq('user_id', userId).limit(1).single();
  if (!conv) { toast('No conversations found for this user', 'info'); return; }
  openMsgModal(conv.id, name);
}

function confirmDelete(userId, name) {
  document.getElementById('confirm-title').textContent = `Delete "${name}"?`;
  document.getElementById('confirm-msg').textContent = 'This will permanently delete the account and all associated data. This cannot be undone.';
  confirmCallback = () => deleteUser(userId, name);
  document.getElementById('confirm-ok').onclick = () => { closeConfirm(); confirmCallback(); };
  document.getElementById('confirm-dialog').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirm-dialog').classList.remove('show');
}

async function deleteUser(userId, name) {
  // Delete from profiles — cascade will handle conversations/messages
  const { error } = await sb.from('profiles').delete().eq('id', userId);
  if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
  toast(`${name} deleted`, 'success');
  if (currentPage === 'users') renderUsers();
  else if (currentPage === 'admins') renderAdmins();
  else if (currentPage === 'frozen') renderFrozen();
}

// ── MESSAGE VIEWER ──
async function openMsgModal(convId, userName) {
  document.getElementById('modal-conv-title').textContent = `💬 ${userName}`;
  document.getElementById('msg-modal').classList.add('show');
  document.getElementById('modal-messages').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  const { data: msgs } = await sb.from('messages')
    .select('*, profiles(display_name, role)')
    .eq('conversation_id', convId)
    .order('created_at', { ascending: true });

  if (!msgs || msgs.length === 0) {
    document.getElementById('modal-messages').innerHTML = '<div class="empty"><div class="icon">💬</div><p>No messages yet</p></div>';
    return;
  }

  const html = msgs.map(m => {
    const isCounsellor = m.sender_role === 'counsellor';
    const senderName = m.profiles?.display_name || (isCounsellor ? 'Counsellor' : 'User');
    const initial = senderName.charAt(0).toUpperCase();

    let contentHtml = '';
    if (m.message_type === 'voice' && m.media_url) {
      contentHtml = `<div class="msg-voice">🎙️ <audio controls src="${m.media_url}" style="height:32px;max-width:200px"></audio></div>`;
    } else if (m.message_type === 'image' && m.media_url) {
      contentHtml = `<div class="msg-image"><img src="${m.media_url}" alt="image" /></div>`;
    } else if (m.message_type === 'video' && m.media_url) {
      contentHtml = `<video controls style="max-width:200px;border-radius:8px" src="${m.media_url}"></video>`;
    } else {
      contentHtml = `<div class="msg-text">${esc(m.content)}</div>`;
    }

    return `
      <div class="msg-bubble ${isCounsellor ? 'counsellor' : ''}">
        <div class="msg-avatar">${initial}</div>
        <div class="msg-content-wrap">
          <div class="msg-sender">${esc(senderName)}</div>
          ${contentHtml}
          <div class="msg-time">${formatDateTime(m.created_at)}</div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('modal-messages').innerHTML = html;

  // Mark as read
  await sb.from('conversations').update({ unread_admin: false }).eq('id', convId);
}

function closeMsgModal() {
  document.getElementById('msg-modal').classList.remove('show');
}

// ── UTILS ──
function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

function formatDateTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function toast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  t.innerHTML = `<span>${icons[type] || 'ℹ️'}</span> ${msg}`;
  document.getElementById('toasts').appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3500);
}

// Close modals on overlay click
document.getElementById('msg-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('msg-modal')) closeMsgModal();
});
</script>
